{% extends 'scanner/base.html' %}

{% block title %}创建定时任务{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-transparent">
                <h5 class="mb-0"><i class="fas fa-clock me-2 text-primary"></i>创建定时扫描任务</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">任务名称</label>
                        <input type="text" name="name" class="form-control" required placeholder="例如: 每日服务器巡检">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">扫描目标</label>
                        <input type="text" name="target" class="form-control" required placeholder="IP、域名或网段 (如 192.168.1.0/24)">
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">扫描类型</label>
                            <select name="scan_type" class="form-select">
                                <option value="quick">快速扫描</option>
                                <option value="normal">标准扫描</option>
                                <option value="deep">深度扫描</option>
                                <option value="service">服务识别</option>
                                <option value="vuln">漏洞扫描</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">端口范围 (可选)</label>
                            <input type="text" name="ports" class="form-control" placeholder="如 80,443,8000-9000">
                        </div>
                    </div>
                    
                    <div class="section-title">调度配置</div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">执行间隔</label>
                            <select name="interval_type" class="form-select" id="intervalType">
                                <option value="MINUTES">按分钟</option>
                                <option value="HOURS">按小时</option>
                                <option value="DAILY" selected>每天</option>
                                <option value="WEEKLY">每周</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">间隔值</label>
                            <input type="number" name="interval_value" class="form-control" value="1" min="1">
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">指定执行时间</label>
                            <input type="time" name="specific_time" class="form-control" value="02:00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">主机发现方式</label>
                            <select name="host_discovery" class="form-select">
                                <option value="DEFAULT">默认</option>
                                <option value="PING_ONLY">仅主机发现 (-sn)</option>
                                <option value="ICMP">ICMP 探测</option>
                                <option value="NO_PING">跳过主机发现 (-Pn)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="section-title">高级选项</div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">TCP 扫描方式</label>
                            <select name="tcp_scan" class="form-select">
                                <option value="SYN">SYN 扫描 (-sS)</option>
                                <option value="CONNECT">TCP 连接扫描 (-sT)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">扫描速度 (-T0 ~ -T5)</label>
                            <select name="timing" class="form-select">
                                <option value="0">T0 (最慢)</option>
                                <option value="1">T1</option>
                                <option value="2">T2</option>
                                <option value="3">T3</option>
                                <option value="4" selected>T4 (默认)</option>
                                <option value="T5">T5 (最快)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enable_tcp" id="enableTcp" checked>
                            <label class="form-check-label" for="enableTcp">启用 TCP 扫描</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enable_udp" id="enableUdp">
                            <label class="form-check-label" for="enableUdp">启用 UDP 扫描</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="use_scripts" id="useScripts">
                            <label class="form-check-label" for="useScripts">启用 NSE 脚本</label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'scheduled_task_list' %}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">创建定时任务</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
