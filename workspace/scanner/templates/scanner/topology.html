{% extends 'scanner/base.html' %}

{% block title %}网络拓扑可视化{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-network-wired me-2"></i> 实时网络拓扑结构</span>
                <div class="small text-muted">
                    <span class="badge bg-primary me-2">核心节点</span>
                    <span class="badge bg-secondary me-2">网段</span>
                    <span class="badge bg-success me-2">在线资产</span>
                    <span class="badge bg-danger">离线资产</span>
                </div>
            </div>
            <div class="card-body p-0" style="background-color: #121212;">
                <div id="topologyChart" style="width: 100%; height: 750px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script>
    var chartDom = document.getElementById('topologyChart');
    var myChart = echarts.init(chartDom, 'dark');
    var data = {{ topology_data|safe }};

    var option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            formatter: function(params) {
                if (params.dataType === 'node') {
                    return params.data.name + (params.data.value ? '<br/>IP: ' + params.data.value : '');
                }
                return params.data.source + ' > ' + params.data.target;
            }
        },
        legend: [{
            data: ['Core', 'Segment', 'Asset'],
            orient: 'vertical',
            left: 'left',
            top: 'center'
        }],
        series: [
            {
                type: 'graph',
                layout: 'force',
                data: data.nodes,
                links: data.links,
                categories: [
                    { name: 'Core' },
                    { name: 'Segment' },
                    { name: 'Asset' }
                ],
                roam: true,
                label: {
                    show: true,
                    position: 'right',
                    formatter: '{b}',
                    fontSize: 10,
                    color: '#ccc'
                },
                force: {
                    repulsion: 300,
                    edgeLength: [50, 150]
                },
                lineStyle: {
                    color: 'source',
                    curveness: 0.1,
                    opacity: 0.4
                },
                emphasis: {
                    focus: 'adjacency',
                    lineStyle: {
                        width: 3
                    }
                }
            }
        ]
    };

    myChart.setOption(option);

    window.addEventListener('resize', function() {
        myChart.resize();
    });
</script>
{% endblock %}
